name: "OP: Rotate Logos"

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const min = 4;
            const max = 5;
            const logos = [...new Set(fs.readdirSync('assets/logos').map(f => f.replace(/-(dark|light)(?=\.[^.]+$)/, '').replace('.png', '')))];
            const count = Math.floor(Math.random() * (max - min + 1)) + min;
            const shuffled = logos.sort(() => Math.random() - 0.5);
            const selected = shuffled.slice(0, Math.min(count, logos.length));
            const html = selected.map(logo => `  <picture><source media="(prefers-color-scheme: dark)" srcset="assets/logos/${logo}-dark.png"><img src="assets/logos/${logo}-light.png" align="center" width="56"/></picture>`).join('\n');
            const replacement = `<!-- LOGO_START -->\n${html}\n  <!-- LOGOS_CEASE -->`;
            const readme = fs.readFileSync('README.md', 'utf8');
            const updated = readme.replace(/<!-- LOGOS_START -->([\s\S]*?)  <!-- LOGOS_CEASE -->/, replacement);
            fs.writeFileSync('README.md', updated);
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: rotate the logos"
          git push